# Template (Azure Pipelines) - CD con Docker Compose (steps)
#
# Template reutilizable para simular CD: up -> e2e -> down (siempre).

parameters:
  mavenImage: "maven:3.8.6-openjdk-11-slim"

steps:
  - script: |
      docker run --rm \
        -v $(pwd):/app \
        -w /app \
        --user $(id -u):$(id -g) \
        -e MAVEN_OPTS="-Dmaven.repo.local=/app/.m2" \
        ${{ parameters.mavenImage }} \
        mvn -q -Dmaven.repo.local=/app/.m2 -DskipTests=true test
    displayName: "Lint (mvn compile sin tests)"
  - script: |
      docker run --rm \
        -v $(pwd):/app \
        -w /app \
        --user $(id -u):$(id -g) \
        -e MAVEN_OPTS="-Dmaven.repo.local=/app/.m2" \
        ${{ parameters.mavenImage }} \
        mvn -q -Dmaven.repo.local=/app/.m2 test
    displayName: "Test (mvn test)"
