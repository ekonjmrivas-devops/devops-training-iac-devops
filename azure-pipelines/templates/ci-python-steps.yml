# Template (Azure Pipelines) - CI Python (steps)
# fix: PIP_USER=0 y HOME=/tmp para evitar permisos root 
# fix: template usa ci.Dockerfile con codigo incluido

parameters:
  pythonImage: "python:3.6-slim"

steps:
  - script: |
      docker build -f devops/ci.Dockerfile -t ci-tools-python .
      docker run --rm ci-tools-python make lint
    displayName: "Lint (flake8 + black)"
  - script: |
      docker run --rm ci-tools-python make test
    displayName: "Test (pytest + coverage)"
